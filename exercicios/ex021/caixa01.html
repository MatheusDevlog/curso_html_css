<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixa</title>
    <style>
        h1 {
            background-color: #acacac;
            height: 100px;
            width: 300px;

            border: 20px solid #ff0000;

            padding: 10px 5px 10px 5px;

            margin: 10px auto 5px auto;

            margin: auto;

            outline: 5px dashed #7b1ed2;
        }

        a {
            border: groove 5px #0000ff;
        }

        p {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
