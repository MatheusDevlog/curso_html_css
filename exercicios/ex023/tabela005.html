<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabelas</title>

    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        caption {
            font-size: 1.5rem;
            padding: 8px;
            font-weight: bold;
        }

        table {
            border-collapse: collapse;
            width: 500px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        .destaque {
            background-color: blueviolet;
        }

        .cnome {
            background-color: rgb(30, 250, 1);
        }
    </style>
</head>
<body>
    <h1>Exercício de Tabela</h1>
    <table>
        <colgroup>
            <col class="cnome">
            <col class="csexo">
            <col class="cidade">
            <col class="cprof">
        </colgroup>

        <caption>Cadastro</caption>

        <thead>
            <tr>
                <th>Nome</th>
                <th>Sexo</th>
                <th>Idade</th>
                <th>Profissão</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Ana Maria</td>
                <td>F</td>
                <td>25</td>
                <td>Jornalista</td>
            </tr>

            <tr>
                <td>Cláudio</td>
                <td>M</td>
                <td>20</td>
                <td>Jogador</td>
            </tr>
            
            <tr>
                <td>Bruno</td>
                <td>M</td>
                <td>23</td>
                <td>Estudante</td>
            </tr>
            
            <tr>
                <td>Beatriz</td>
                <td>F</td>
                <td>14</td>
                <td>Estudante</td>
            </tr>

            <tr>
                <td>Vitoria</td>
                <td>F</td>
                <td>22</td>
                <td>Modelo</td>
            </tr>
            
            <tr>
                <td>rafael</td>
                <td>M</td>
                <td>25</td>
                <td>Desenvolvedor</td>
            </tr>            
        </tbody>
    </table>
</body>
</html>
