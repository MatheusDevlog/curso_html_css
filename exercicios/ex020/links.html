<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizando Links</title>
    <style>
        body {
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }

        a {
            color: #0059ff;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: #0043a7;
        }

        a:hover {
            color: blueviolet;
            text-decoration: underline;
        }

        a:active {
            color: rgb(255, 0, 0);
        }

        a::after {
            content: ' [link]';
            text-decoration: none;
            font-weight: normal;
            color: #0059ff;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://github.com/MatheusDevlog" target="_blank">Repositório GitHub</a></li>
        <li><a href="https://www.youtube.com/@cursoemvideo" target="_blank">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com/curso/curso-html5-e-css3-modulo-2-de-5-40-horas/" target="_blank">Site do Curso em Vídeo</a></li>
    </ul>
</body>
</html>
